services:
  # Backend Node.js Service
  - type: web
    name: photo-studio-backend
    env: node
    region: oregon
    rootDir: app/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: photo-studio-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # Frontend Next.js Service
  - type: web
    name: photo-studio-frontend
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: photo-studio-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: RESEND_API_KEY
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
